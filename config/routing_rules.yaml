# ContextForge Routing Rules
# Rule-based model complexity routing configuration

rules:
  # Simple queries — route to cheaper/faster models
  simple:
    max_tokens: 200
    keywords:
      - "hello"
      - "hi"
      - "hey"
      - "thanks"
      - "thank you"
      - "yes"
      - "no"
      - "ok"
      - "okay"
      - "what is"
      - "who is"
      - "when is"
      - "where is"
      - "how old"

  # Complex queries — route to more capable models
  complex:
    min_tokens: 500
    keywords:
      - "analyze"
      - "compare"
      - "explain in detail"
      - "write a comprehensive"
      - "debug"
      - "refactor"
      - "architect"
      - "summarize"
      - "implement"
      - "write code"
      - "code review"
      - "step by step"
      - "pros and cons"
      - "trade-offs"
      - "design pattern"
      - "algorithm"
      - "optimize"
      - "performance"
      - "security"
      - "vulnerability"

# Model tier mappings by provider
model_map:
  openai:
    simple: "gpt-3.5-turbo"
    complex: "gpt-4o"
  anthropic:
    simple: "claude-3-haiku-20240307"
    complex: "claude-3-opus-20240229"

# Default model when no rule matches
default_model: "gpt-3.5-turbo"

# Provider preference order
provider_preference:
  - openai
  - anthropic
